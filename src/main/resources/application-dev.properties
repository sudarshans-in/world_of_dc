# MongoDB URI Configuration
# Spring Boot automatically maps SPRING_DATA_MONGODB_URI environment variable to spring.data.mongodb.uri
# Environment variables take precedence over this file
# If MONGODB_URI is not set, the application will fail to start (which is desired for production)
# DO NOT set a default value here - it must come from environment variable

server.port=8080
server.servlet.context-path=/

spring.data.mongodb.uri=${MONGODB_URI}

# Logging configuration
logging.level.root=WARN
logging.level.com.cachar.complaint=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.org.mongodb.driver=DEBUG
logging.file.name=/var/log/cachar-complaints/application.log

# Log MongoDB connection details (masked password)
logging.level.org.springframework.boot.autoconfigure.mongo=DEBUG


logging.level.com.cachar.complaint=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
