# MongoDB URI Configuration
# IMPORTANT: This MUST be set via environment variable MONGODB_URI or SPRING_DATA_MONGODB_URI
# Spring Boot automatically maps SPRING_DATA_MONGODB_URI environment variable to spring.data.mongodb.uri
# Environment variables take precedence over this file
# If neither is set, application will fail (which is desired for production)
# DO NOT set a default value - it must come from environment variable

server.port=8080
server.servlet.context-path=/

spring.data.mongodb.uri=${MONGODB_URI:${SPRING_DATA_MONGODB_URI:REQUIRED_NOT_SET}}

# Logging configuration
logging.level.root=WARN
logging.level.com.cachar.complaint=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.mongodb.driver=INFO
logging.file.name=/var/log/cachar-complaints/application.log

# Log MongoDB connection details (masked password)
logging.level.org.springframework.boot.autoconfigure.mongo=DEBUG
