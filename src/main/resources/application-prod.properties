# MongoDB URI Configuration
# Spring Boot automatically maps SPRING_DATA_MONGODB_URI environment variable to spring.data.mongodb.uri
# Priority: SPRING_DATA_MONGODB_URI (env) > MONGODB_URI (env) > default below
# If environment variables are not set, will use the default localhost connection
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/cachar_complaints}

# Logging configuration
logging.level.root=WARN
logging.level.com.cachar.complaint=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.mongodb.driver=INFO
logging.file.name=/var/log/cachar-complaints/application.log

# Log MongoDB connection details (masked password)
logging.level.org.springframework.boot.autoconfigure.mongo=DEBUG
