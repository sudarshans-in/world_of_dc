# =============================================================================
# Cachar District Complaint Management System - Properties Configuration
# =============================================================================

# -----------------------------------------------------------------------------
# SERVER CONFIGURATION
# -----------------------------------------------------------------------------
server.port=${PORT:8080}
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.error.include-message=always
server.error.include-binding-errors=always

# Compression for performance
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# -----------------------------------------------------------------------------
# APPLICATION CONFIGURATION
# -----------------------------------------------------------------------------
spring.application.name=cachar-complaint-system

# -----------------------------------------------------------------------------
# DATABASE CONFIGURATION
# -----------------------------------------------------------------------------

# H2 Database (Development/Testing)
spring.datasource.url=jdbc:h2:mem:cachar_complaints;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# MySQL Database (Production - uncomment + configure)
# spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/cachar_complaints?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
# spring.datasource.username=${DB_USERNAME}
# spring.datasource.password=${DB_PASSWORD}
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.pool-name=CacharComplaintPool
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000

# -----------------------------------------------------------------------------
# JPA/HIBERNATE CONFIGURATION
# -----------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
#spring.jpa.properties.hibernate.dialect=org.h2.dialect.H2Dialect
# For MySQL: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# -----------------------------------------------------------------------------
# FILE UPLOAD CONFIGURATION
# -----------------------------------------------------------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

file.upload-dir=./uploads
file.max-file-size=10485760
file.allowed-extensions=pdf,jpg,jpeg,png,gif
file.storage-type=local

# -----------------------------------------------------------------------------
# H2 CONSOLE (Dev Only)
# -----------------------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# -----------------------------------------------------------------------------
# JACKSON JSON CONFIGURATION
# -----------------------------------------------------------------------------
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.accept-single-value-as-array=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata

# -----------------------------------------------------------------------------
# SECURITY CONFIGURATION
# -----------------------------------------------------------------------------
# Default in-memory user (DEV only) - disable in PROD
spring.security.user.name=${ADMIN_USER:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}
spring.security.user.roles=ADMIN

# -----------------------------------------------------------------------------
# SMS/OTP CONFIGURATION
# -----------------------------------------------------------------------------
sms.provider=${SMS_PROVIDER:console}
sms.api-key=${SMS_API_KEY:dummy_key}
sms.sender-id=CACHAR
sms.template.otp=Your OTP for Cachar Complaint System is {otp}. Valid for 5 minutes.

# -----------------------------------------------------------------------------
# EMAIL CONFIGURATION
# -----------------------------------------------------------------------------
email.enabled=${EMAIL_ENABLED:false}
email.host=smtp.gmail.com
email.port=587
email.username=${EMAIL_USERNAME}
email.password=${EMAIL_PASSWORD}
email.properties.mail.smtp.auth=true
email.properties.mail.smtp.starttls.enable=true

# -----------------------------------------------------------------------------
# COMPLAINT CONFIGURATION
# -----------------------------------------------------------------------------
complaint.number.prefix=CCR
complaint.number.length=18
complaint.status.auto-close-days=30
complaint.assignment.notification=true

# -----------------------------------------------------------------------------
# LOGGING CONFIGURATION
# -----------------------------------------------------------------------------
logging.level.root=INFO
logging.level.com.cachar.complaint=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/cachar-complaints.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=1GB

# -----------------------------------------------------------------------------
# ACTUATOR/MONITORING
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics,env,loggers
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when_authorized
management.info.git.mode=full

# -----------------------------------------------------------------------------
# APPLICATION INFO
# -----------------------------------------------------------------------------
info.app.name=Cachar District Complaint Management System
info.app.description=Digital platform for citizen complaint management in Cachar, Assam
info.app.version=1.0.0
info.contact.email=dc.cachar@assam.gov.in
info.contact.phone=+91-3842-231234
info.system.timezone=Asia/Kolkata
info.system.locale=en_IN

